<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premiumisme CRM - Cloud Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #7c4dff; --success: #00c853; --danger: #ff1744; --text: #e0e0e0; --gray: #9e9e9e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* Stats Header */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card h3 { font-size: 12px; color: var(--gray); text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 10px 0 0; }

        /* Form & Variations */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }
        
        .item-row { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price { font-weight: bold; color: var(--success); }
        
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; margin-bottom: 10px; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-purple { background: var(--primary); }
        .btn-purple:hover { opacity: 0.8; }
        .btn-outline { background: transparent; border: 1px solid #555; width: auto; padding: 5px 15px; }

        /* Vault Section */
        #vault-section { border: 2px dashed var(--primary); display: none; }
        .log-item { font-size: 12px; padding: 5px 0; border-bottom: 1px solid #333; }
        .log-time { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Premiumisme<span style="font-size:14px; color:var(--primary)"> CRM</span></h1>
        <div id="status-cloud">☁️ Connected to Cloud</div>
    </div>

    <!-- 1. Stats -->
    <div class="stats-grid">
        <div class="card stat-card"><h3>Profit Bersih</h3><p id="stat-profit">Rp 0</p></div>
        <div class="card stat-card"><h3>Total Penjualan</h3><p id="stat-sales">0</p></div>
        <div class="card stat-card"><h3>Stok Global</h3><p id="stat-stock">0</p></div>
    </div>

    <div class="main-grid">
        <!-- 2. Manage Variations -->
        <div class="card">
            <h3>Manage Variations</h3>
            <div id="variation-list">Loading variations...</div>
            <button class="btn-purple" onclick="addNewVariation()" style="margin-top:15px;">+ Add New Variation</button>
            
            <!-- Vault Area -->
            <div id="vault-section" class="card">
                <h4 id="vault-title">Vault Data</h4>
                <textarea id="vault-input" rows="5" placeholder="email|pass (satu per baris)"></textarea>
                <button class="btn-purple" onclick="saveVault()">Update Vault & Stok</button>
            </div>
        </div>

        <!-- 3. Checkout Section -->
        <div class="card" style="border: 1px solid var(--success);">
            <h3>⚡ Quick Checkout (Auto-Send)</h3>
            <input type="text" id="cust-name" placeholder="Nama Pembeli">
            <input type="text" id="cust-wa" placeholder="WhatsApp (628...)">
            <select id="select-var">
                <option value="">-- Pilih Paket Akun --</option>
            </select>
            <input type="number" id="cust-price" placeholder="Harga Jual (Rp)">
            <input type="number" id="cust-modal" placeholder="Harga Modal (Rp)">
            <button class="btn-purple" style="background:var(--success)" onclick="processCheckout()">KONFIRMASI & KIRIM AKUN</button>
        </div>
    </div>

    <!-- 4. Logs -->
    <div class="card">
        <h3>Activity Logs</h3>
        <div id="log-list" style="max-height: 150px; overflow-y: auto;"></div>
    </div>
</div>

<script>

    // === CONFIG FIREBASE ===
    const firebaseConfig = {
        apiKey: "AIzaSyBXYEp5UixhbtyjwnqmaVQX1a1yQz7Res0",
        authDomain: "crm-deka.firebaseapp.com",
        projectId: "crm-deka",
        storageBucket: "crm-deka.firebasestorage.app",
        messagingSenderId: "930670861746",
        appId: "1:930670861746:web:de8fa209f6262d70fe58ab"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentProduct = "CapCut Famhead"; // Contoh Produk Utama
    let activeVarId = "";

    // === LOGIC: MANAGE VARIATIONS ===
    function listenVariations() {
        db.collection("products").doc(currentProduct).collection("variations").onSnapshot(snapshot => {
            const list = document.getElementById("variation-list");
            const select = document.getElementById("select-var");
            let html = "", options = '<option value="">-- Pilih Paket Akun --</option>', totalStock = 0;

            snapshot.forEach(doc => {
                const d = doc.data();
                totalStock += (d.stock || 0);
                html += `
                    <div class="item-row">
                        <div><b>${d.name}</b><br><small>${d.stock || 0} items</small></div>
                        <div>
                            <span class="price">Rp ${(d.price || 0).toLocaleString()}</span>
                            <button class="btn-outline" onclick="openVault('${doc.id}', '${d.name}')">Stocks</button>
                        </div>
                    </div>`;
                options += `<option value="${doc.id}">${d.name} (Stok: ${d.stock})</option>`;
            });
            list.innerHTML = html;
            select.innerHTML = options;
            document.getElementById("stat-stock").innerText = totalStock;
        });
    }

    async function addNewVariation() {
        const name = prompt("Nama Variasi (ex: 30 Hari):");
        const price = prompt("Harga Jual:");
        if(name && price) {
            await db.collection("products").doc(currentProduct).collection("variations").add({
                name: name, price: parseInt(price), stock: 0, vault: [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            createLog("Add Variation", `Menambah paket ${name}`);
        }
    }

    // === LOGIC: VAULT ===
    function openVault(id, name) {
        activeVarId = id;
        document.getElementById("vault-section").style.display = "block";
        document.getElementById("vault-title").innerText = "Vault: " + name;
        db.collection("products").doc(currentProduct).collection("variations").doc(id).get().then(doc => {
            document.getElementById("vault-input").value = (doc.data().vault || []).join('\n');
        });
    }

    async function saveVault() {
        const data = document.getElementById("vault-input").value.split('\n').filter(l => l.trim() !== "");
        await db.collection("products").doc(currentProduct).collection("variations").doc(activeVarId).update({
            vault: data, stock: data.length
        });
        document.getElementById("vault-section").style.display = "none";
        createLog("Update Vault", `Update stok variasi ID ${activeVarId} jadi ${data.length}`);
    }

    // === LOGIC: CHECKOUT & AUTO-SEND ===
    async function processCheckout() {
        const varId = document.getElementById("select-var").value;
        const name = document.getElementById("cust-name").value;
        const wa = document.getElementById("cust-wa").value;
        const jual = parseInt(document.getElementById("cust-price").value);
        const modal = parseInt(document.getElementById("cust-modal").value);

        if(!varId || !wa) return alert("Pilih paket & isi nomor WA!");

        try {
            const varRef = db.collection("products").doc(currentProduct).collection("variations").doc(varId);
            const account = await db.runTransaction(async (transaction) => {
                const doc = await transaction.get(varRef);
                const vault = doc.data().vault || [];
                if(vault.length === 0) throw "STOK HABIS!";
                const pulled = vault.shift();
                transaction.update(varRef, { vault: vault, stock: vault.length });
                return pulled;
            });

            // Simpan Sales
            await db.collection("sales").add({
                buyer: name, product: currentProduct, profit: (jual - modal), timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            createLog("Sales", `Berhasil kirim ke ${name}`);

            // WhatsApp Redirect
            const pesan = `*ORDER SUCCESS*%0A%0AHi *${name}*, ini akun kakak:%0A\`${account}\` %0A%0ATerima kasih!`;
            window.open(`https://wa.me/${wa.replace(/[^0-9]/g, '')}?text=${pesan}`, '_blank');
        } catch (e) { alert(e); }
    }

    // === LOGIC: LOGS & STATS ===
    function createLog(action, detail) {
        db.collection("activity_logs").add({ admin: "Owner", action, detail, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    }

    function listenStats() {
        db.collection("sales").onSnapshot(snap => {
            let profit = 0;
            snap.forEach(doc => profit += doc.data().profit);
            document.getElementById("stat-profit").innerText = "Rp " + profit.toLocaleString();
            document.getElementById("stat-sales").innerText = snap.size;
        });
        db.collection("activity_logs").orderBy("timestamp", "desc").limit(10).onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="log-item"><span class="log-time">[Log]</span> <b>${d.action}</b>: ${d.detail}</div>`;
            });
            document.getElementById("log-list").innerHTML = html;
        });
    }

    listenVariations();
    listenStats();
</script>
</body>
</html>
