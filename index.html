<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail - Layanan Email Sementara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .email-control-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .email-input-wrapper {
            flex-grow: 1;
            position: relative;
            min-width: 200px;
        }
        .custom-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: #111827;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .custom-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .custom-select {
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            background: #f9fafb;
            color: #4b5563;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }
        .custom-select:focus { border-color: #2563eb; }
        .help-text {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: -5px;
            margin-bottom: 15px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        /* Ikon SVG di dalam tombol */
        .btn svg { width: 18px; height: 18px; margin-right: 6px; vertical-align: text-bottom; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Temp<span>Mail</span></h1>
            <p>Alamat email sementara yang cepat, aman, dan tanpa jejak.</p>
        </header>

        <main>
            <div class="email-box">
                <div class="email-control-group">
                    <div class="email-input-wrapper">
                        <input type="text" id="temp-email" class="custom-input" placeholder="Ketik nama email..." autocomplete="off">
                    </div>
                    <select id="domain-select" class="custom-select">
                        <option value="@dekapp.web.id">@dekapp.web.id</option>
                        <option value="@dekastore.net">@dekastore.net</option>
                    </select>
                </div>
                
                <div class="help-text">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                    <span>Kamu bisa menghapus teks di atas dan mengetik nama email sesuka hati!</span>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" onclick="copyEmail()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Salin
                    </button>
                    <button class="btn btn-secondary" id="refresh-btn" onclick="refreshInbox()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        <span class="btn-text">Refresh</span>
                    </button>
                </div>
            </div>

            <div class="inbox">
                <div class="inbox-header">
                    <h2>Kotak Masuk</h2>
                    <div class="status-container" style="display: flex; align-items: center; gap: 0.5rem; margin-left: auto;">
                        <span id="countdown-text" style="font-size: 0.85rem; color: #6b7280; font-weight: 500;">Update dalam 10s</span>
                        <span class="status-dot" id="status-dot" style="display: inline-block; width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);"></span>
                    </div>
                </div>
                
                <div class="inbox-list" id="inbox-list">
                    <div class="empty-state">
                        <p>Menunggu email masuk...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="email-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(4px); z-index: 1000; padding: 20px; box-sizing: border-box;">
        <div class="modal-content" style="background: white; max-width: 650px; margin: 40px auto; padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); max-height: 85vh; display: flex; flex-direction: column;">
            
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; margin-bottom: 20px;">
                <h3 id="modal-subject" style="margin: 0; font-size: 1.4rem; color: #111827; line-height: 1.4;">Memuat subjek...</h3>
                <button class="close-btn" onclick="closeModal()" style="background: #f3f4f6; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; color: #4b5563; transition: 0.2s;">&times;</button>
            </div>
            
            <div class="modal-meta" style="font-size: 0.95rem; color: #4b5563; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; background: #f9fafb; padding: 12px 15px; border-radius: 8px;">
                <span id="modal-sender" style="font-weight: 600; color: #2563eb;">Pengirim</span>
                <span id="modal-time" style="font-size: 0.85rem;">Waktu</span>
            </div>
            
            <div class="modal-body" id="modal-body" style="overflow-y: auto; flex-grow: 1;">
                <div class="spinner modal-spinner" id="modal-loading" style="text-align: center; color: #6b7280; padding: 20px;">Memuat isi pesan...</div>
                <div id="modal-content-html" style="display: none; line-height: 1.6; color: #374151;"></div>
            </div>

        </div>
    </div>

    <div id="toast" class="toast" style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 1001; transition: opacity 0.3s;">Notifikasi</div>

    <script src="script.js"></script>
</body>
</html>
