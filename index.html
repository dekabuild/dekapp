<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail - Layanan Email Sementara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Temp<span>Mail</span></h1>
            <p>Alamat email sementara yang cepat, aman, dan tanpa jejak.</p>
        </header>

        <main>
            <div class="email-box">
                <div style="margin-bottom: 8px; text-align: left;">
                    <select id="domain-select" onchange="generateNewEmail()" style="padding: 6px 10px; border-radius: 6px; border: 1px solid #d1d5db; font-family: 'Inter', sans-serif; font-size: 0.85rem; outline: none; cursor: pointer; background: #f9fafb; color: #4b5563;">
                        <option value="@dekapp.web.id">@dekapp.web.id</option>
                        <option value="@dekastore.net">@dekastore.net</option>
                    </select>
                </div>
                
                <input type="text" id="temp-email" value="Memuat..." readonly>
                <div class="actions">
                    <button class="btn btn-primary" onclick="copyEmail()">Salin</button>
                    <button class="btn btn-secondary" id="refresh-btn" onclick="refreshInbox()">
                        <span class="btn-text">Refresh</span>
                        <span class="spinner"></span>
                    </button>
                </div>
            </div>

            <div class="inbox">
                <div class="inbox-header">
                    <h2>Kotak Masuk</h2>
                    <div class="status-container" style="display: flex; align-items: center; gap: 0.5rem; margin-left: auto;">
                        <span id="countdown-text" style="font-size: 0.85rem; color: var(--text-secondary);">Update dalam 10s</span>
                        <span class="status-dot" id="status-dot" style="display: inline-block; width: 8px; height: 8px; background-color: #10b981; border-radius: 50%;"></span>
                    </div>
                </div>
                
                <div class="inbox-list" id="inbox-list">
                    <div class="empty-state">
                        <p>Menunggu email masuk...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="email-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div class="modal-content" style="background: white; max-width: 600px; margin: 50px auto; padding: 20px; border-radius: 12px; max-height: 80vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">
                <h3 id="modal-subject" style="margin: 0;">Memuat subjek...</h3>
                <button class="close-btn" onclick="closeModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-meta" style="font-size: 0.9rem; color: #666; margin-bottom: 20px; display: flex; justify-content: space-between;">
                <span id="modal-sender">Pengirim</span>
                <span id="modal-time">Waktu</span>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="spinner modal-spinner" id="modal-loading">Memuat isi pesan...</div>
                <div id="modal-content-html" style="display: none;"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; z-index: 1001;">Notifikasi</div>

    <script src="script.js"></script>
</body>
</html>
