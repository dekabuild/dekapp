<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail - Layanan Email Sementara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Temp<span>Mail</span></h1>
            <p>Alamat email sementara yang cepat, aman, dan tanpa jejak.</p>
        </header>

        <main>
            <div class="email-box">
                <input type="text" id="temp-email" value="admin@mails.dekastore.net" readonly>
                <div class="actions">
                    <button class="btn btn-primary" onclick="copyEmail()">Salin</button>
                    <button class="btn btn-secondary" id="refresh-btn" onclick="refreshInbox()">
                        <span class="btn-text">Refresh</span>
                        <span class="spinner"></span>
                    </button>
                </div>
            </div>

            <div class="inbox">
                <div class="inbox-header">
                    <h2>Kotak Masuk</h2>
                    <div class="status-container" style="display: flex; align-items: center; gap: 0.5rem; margin-left: auto;">
                        <span id="countdown-text" style="font-size: 0.85rem; color: var(--text-secondary);">Update dalam 10s</span>
                        <span class="status-dot"></span>
                    </div>
                </div>
                
                <div class="inbox-list">
                    <div class="empty-state">
                        <p>Menunggu email masuk...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="email-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-subject">Memuat subjek...</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-meta">
                <span id="modal-sender">Pengirim</span>
                <span id="modal-time">Waktu</span>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="spinner modal-spinner" id="modal-loading"></div>
                <div id="modal-content-html"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Notifikasi</div>

    <script src="script.js"></script>
</body>
</html>
